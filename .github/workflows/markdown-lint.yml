name: Markdown Lint

on:
  pull_request:
    paths:
      - '**.md'
  push:
    branches: [main, master]
    paths:
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: articulate/actions-markdownlint@v1
        with:
          files: 'README.md README.zh-CN.md CONTRIBUTING.md'
          config: .markdownlint.json

      - name: Check links
        uses: lycheeverse/lychee-action@v1.8.0
        with:
          args: --verbose --no-progress './README*.md' './CONTRIBUTING.md'
          fail: true
